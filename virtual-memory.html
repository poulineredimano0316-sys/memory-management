<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Allocation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; text-align: center;
            padding: 80px 20px 100px;
            background: radial-gradient(circle at 50% 0%, #3b117a 0%, #150833 45%, #0d0628 100%);
            color: #fff; min-height: 100vh; position: relative;
            display: flex; flex-direction: column; align-items: center;
        }
        body::before {
            content: ''; position: fixed; top: 10%; left: 50%; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,242,255,0.08) 0%, rgba(255,0,212,0.05) 40%, transparent 70%);
            transform: translateX(-50%); z-index: -1; pointer-events: none;
        }
        .back-button {
            position: fixed; bottom: 30px; left: 30px; padding: 12px 25px;
            font-weight: 700; background: rgba(255,255,255,0.08); color: white;
            border-radius: 100px; text-decoration: none; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; z-index: 1100; font-family: 'Inter', sans-serif;
        }
        .back-button:hover { background: #00f2ff; color: #000; transform: translateY(-3px); }
        h1 {
            font-family: 'Archivo Black', sans-serif; font-size: clamp(2rem,6vw,3.5rem);
            margin-bottom: 40px; text-transform: uppercase; letter-spacing: -1px;
        }
        form {
            margin-bottom: 40px; background: rgba(255,255,255,0.03);
            padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(20px); box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            width: 100%; max-width: 500px;
        }
        label { font-weight: 700; color: #00f2ff; display: block; margin-bottom: 15px; font-size: 0.95rem; }
        input[type="number"] {
            padding: 16px; margin: 10px 0; width: 100%; font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px;
            background: rgba(0,0,0,0.3); color: white; font-weight: 600; outline: none; text-align: center; font-family: 'Inter', sans-serif;
        }
        button {
            background: #00f2ff; color: #000; border: none; cursor: pointer;
            font-weight: 800; text-transform: uppercase; margin-top: 25px;
            padding: 16px; border-radius: 15px; width: 100%; font-size: 0.95rem;
            box-shadow: 0 5px 20px rgba(0,242,255,0.3); transition: 0.3s; font-family: 'Inter', sans-serif;
        }
        button:hover { transform: translateY(-3px); filter: brightness(1.2); }
        .result {
            font-size: 1rem; margin-bottom: 30px; padding: 15px 30px;
            background: rgba(0,242,255,0.1); border-radius: 100px;
            color: #00f2ff; font-weight: 700; border: 1px solid rgba(0,242,255,0.3);
            max-width: 600px; width: 100%;
        }
        .result.error { background: rgba(255,60,100,0.1); color: #ff6b8a; border-color: rgba(255,60,100,0.3); }
        .container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; width: 100%; max-width: 1000px; }
        .box {
            flex: 1; min-width: 280px; background: rgba(255,255,255,0.03);
            padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.08);
        }
        .box h2 {
            font-family: 'Archivo Black', sans-serif; font-size: 1.3rem;
            margin-bottom: 20px; color: #00f2ff; text-transform: uppercase;
        }
        .partition {
            padding: 15px; margin: 10px 0; border-radius: 12px;
            background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7);
            font-weight: 700; border: 1px solid rgba(255,255,255,0.05); transition: all 0.4s ease;
        }
        .filled {
            background: linear-gradient(135deg, #00f2ff, #a855f7);
            color: #000; box-shadow: 0 5px 15px rgba(0,242,255,0.3); border: none;
            animation: pop 0.4s ease;
        }
        @keyframes pop { 0%{transform:scale(0.9);opacity:0;} 100%{transform:scale(1);opacity:1;} }
        #result-area { width: 100%; display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body>
<a href="index.html" class="back-button">← BACK</a>
<h1>VIRTUAL MEMORY</h1>

<div id="result-area"></div>

<form onsubmit="placeFile(event)">
    <label>Enter File Size (KB):</label>
    <input type="number" id="file_size" min="1" placeholder="e.g. 512" required>
    <button type="submit">Place File</button>
</form>

<div class="container">
    <div class="box">
        <h2>Primary Memory</h2>
        <div id="primary-memory"><div class="partition">No file placed</div></div>
    </div>
    <div class="box">
        <h2>Virtual Memory</h2>
        <div id="virtual-partitions"></div>
    </div>
</div>

<script>
    const PARTITIONS = [223, 300, 689, 1034, 4302];
    let placedFile = null;

    function renderPartitions() {
        const container = document.getElementById('virtual-partitions');
        container.innerHTML = PARTITIONS.map(p => {
            const filled = placedFile && placedFile.partition === p;
            const display = filled ? `${placedFile.size}KB / ${p}KB` : `${p}KB`;
            return `<div class="partition ${filled ? 'filled' : ''}">${display}</div>`;
        }).join('');
    }

    function renderPrimary() {
        const el = document.getElementById('primary-memory');
        el.innerHTML = placedFile
            ? `<div class="partition filled">File: ${placedFile.size}KB</div>`
            : `<div class="partition">No file placed</div>`;
    }

    function placeFile(e) {
        e.preventDefault();
        const size = parseInt(document.getElementById('file_size').value);
        const resultArea = document.getElementById('result-area');
        placedFile = null;

        let allocated = false;
        for (const p of PARTITIONS) {
            if (size <= p) {
                placedFile = { size, partition: p };
                allocated = true;
                resultArea.innerHTML = `<div class="result">✔ File of ${size}KB placed in Virtual Memory (Partition ${p}KB)</div>`;
                break;
            }
        }
        if (!allocated) {
            resultArea.innerHTML = `<div class="result error">✘ File of ${size}KB could not be placed: Not enough space.</div>`;
        }
        renderPartitions();
        renderPrimary();
    }

    renderPartitions();
</script>
</body>
</html>
